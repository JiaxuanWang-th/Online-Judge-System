<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>题目管理 · Summer OJ</title>
  <link rel="stylesheet" href="/css/style.css?v=3" />
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">Python <span>Summer OJ</span></div>
      <nav class="nav">
        <a href="/problems.html">题目</a>
        <a href="/submissions.html">提交</a>
        <a href="/teacher.html" data-role-teacher>题目管理</a>
        <a href="/admin.html" data-role-admin style="display:none">系统管理</a>
        <span class="userchip" id="current-user">...</span>
        <a href="#" onclick="logout(); return false;">登出</a>
      </nav>
    </header>

    <div id="alert" class="alert" hidden></div>

    <section class="panel">
      <h1>题目管理</h1>
      <p class="page-sub">教师/管理员可创建、编辑、删除题目（含 test_cases）</p>
      <div id="list"></div>
      <div id="pager"></div>
    </section>

    <section class="panel">
      <h2 id="form-title">创建题目</h2>
      <form id="problem-form">
        <label for="id">题目编号（创建后不可改）</label>
        <input id="id" required placeholder="例如 A1" />

        <label for="title">标题</label>
        <input id="title" required />

        <label for="difficulty">难度</label>
        <select id="difficulty">
          <option value="easy">easy</option>
          <option value="medium">medium</option>
          <option value="hard">hard</option>
        </select>

        <div class="row">
          <div style="flex:1">
            <label for="time_limit">时限（秒）</label>
            <input id="time_limit" type="number" step="0.1" min="0.1" value="1" required />
          </div>
          <div style="flex:1">
            <label for="memory_limit">内存（MB）</label>
            <input id="memory_limit" type="number" min="1" value="128" required />
          </div>
        </div>

        <label for="tags">标签（逗号分隔）</label>
        <input id="tags" placeholder="math, beginner" />

        <label for="description">题目描述</label>
        <textarea id="description" class="tall" required></textarea>

        <label for="input_description">输入说明</label>
        <textarea id="input_description" class="tall" required></textarea>

        <label for="output_description">输出说明</label>
        <textarea id="output_description" class="tall" required></textarea>

        <label for="constraints">数据范围</label>
        <textarea id="constraints" class="tall"></textarea>

        <label for="samples_json">样例 JSON（数组）</label>
        <textarea id="samples_json" class="code" required>[
  {"input": "1 2", "output": "3"}
]</textarea>

        <label for="test_cases_json">测试点 JSON（总分须为 100）</label>
        <textarea id="test_cases_json" class="code" required>[
  {"case_id": "1", "input": "1 2", "output": "3", "score": 50, "is_hidden": false},
  {"case_id": "2", "input": "2 3", "output": "5", "score": 50, "is_hidden": true}
]</textarea>

        <div class="actions">
          <button class="btn btn-primary" id="save-btn" type="submit">创建</button>
          <button class="btn btn-secondary" id="reset-btn" type="button">清空 / 新建</button>
        </div>
      </form>
    </section>
  </div>
  <script src="/js/api.js?v=3"></script>
  <script>
    let editingId = null;
    let listPage = 1;
    const PAGE_SIZE = 20;
    const alertEl = document.getElementById("alert");

    function parseJsonField(text, label) {
      try {
        return JSON.parse(text);
      } catch {
        throw new Error(`${label} 不是合法 JSON`);
      }
    }

    function fillForm(p) {
      editingId = p ? p.id : null;
      document.getElementById("form-title").textContent = p ? `编辑题目 ${p.id}` : "创建题目";
      document.getElementById("save-btn").textContent = p ? "保存修改" : "创建";
      document.getElementById("id").value = p ? p.id : "";
      document.getElementById("id").disabled = !!p;
      document.getElementById("title").value = p ? p.title : "";
      document.getElementById("difficulty").value = p ? p.difficulty : "easy";
      document.getElementById("time_limit").value = p ? p.time_limit : 1;
      document.getElementById("memory_limit").value = p ? p.memory_limit : 128;
      document.getElementById("tags").value = p ? (p.tags || []).join(", ") : "";
      document.getElementById("description").value = p ? p.description : "";
      document.getElementById("input_description").value = p ? p.input_description : "";
      document.getElementById("output_description").value = p ? p.output_description : "";
      document.getElementById("constraints").value = p ? (p.constraints || "") : "";
      document.getElementById("samples_json").value = JSON.stringify(p ? p.samples : [{ input: "1 2", output: "3" }], null, 2);
      document.getElementById("test_cases_json").value = JSON.stringify(
        p ? p.test_cases : [
          { case_id: "1", input: "1 2", output: "3", score: 50, is_hidden: false },
          { case_id: "2", input: "2 3", output: "5", score: 50, is_hidden: true },
        ],
        null,
        2
      );
    }

    async function loadList(page = listPage) {
      listPage = page;
      const res = await api(`/api/problems?page=${page}&page_size=${PAGE_SIZE}`);
      if (res.code !== 200) {
        showAlert(alertEl, res.message || "加载失败");
        return;
      }
      const data = res.data || {};
      const items = data.items || [];
      const total = data.total || 0;
      const cur = data.page || page;
      const box = document.getElementById("list");
      const pager = document.getElementById("pager");
      if (!items.length && total === 0) {
        box.innerHTML = '<p class="empty">暂无题目，请在下方创建</p>';
        pager.innerHTML = "";
        return;
      }
      box.innerHTML = `
        <table>
          <thead><tr><th>编号</th><th>标题</th><th>难度</th><th>操作</th></tr></thead>
          <tbody>
            ${items.map((p) => `
              <tr>
                <td>${escapeHtml(p.id)}</td>
                <td>${escapeHtml(p.title)}</td>
                <td><span class="badge ${escapeHtml(p.difficulty)}">${escapeHtml(p.difficulty)}</span></td>
                <td>
                  <button class="btn btn-secondary" data-edit="${escapeHtml(p.id)}" type="button">编辑</button>
                  <button class="btn btn-danger" data-del="${escapeHtml(p.id)}" type="button">删除</button>
                </td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
      pager.innerHTML = renderPaginationHtml(cur, PAGE_SIZE, total);
      wirePagination(pager, loadList);
      box.querySelectorAll("[data-edit]").forEach((btn) => {
        btn.onclick = async () => {
          const id = btn.getAttribute("data-edit");
          const detail = await api(`/api/problems/${encodeURIComponent(id)}`);
          if (detail.code !== 200) {
            showAlert(alertEl, detail.message || "加载题目失败");
            return;
          }
          fillForm(detail.data);
          showAlert(alertEl, `已载入 ${id}，可修改后保存`, "info");
          window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
        };
      });
      box.querySelectorAll("[data-del]").forEach((btn) => {
        btn.onclick = async () => {
          const id = btn.getAttribute("data-del");
          if (!confirm(`确认删除题目 ${id}？`)) return;
          const del = await api(`/api/problems/${encodeURIComponent(id)}`, { method: "DELETE" });
          if (del.code !== 200) {
            showAlert(alertEl, del.message || "删除失败");
            return;
          }
          showAlert(alertEl, `已删除 ${id}`, "ok");
          if (editingId === id) fillForm(null);
          await loadList(listPage);
        };
      });
    }

    (async () => {
      const user = await requireLogin();
      if (!user) return;
      fillNavUser(user);
      if (user.role !== "teacher" && user.role !== "admin") {
        showAlert(alertEl, "权限不足：仅教师/管理员可管理题目");
        document.getElementById("problem-form").style.display = "none";
        return;
      }
      fillForm(null);
      await loadList();

      document.getElementById("reset-btn").onclick = () => {
        fillForm(null);
        showAlert(alertEl, "");
      };

      document.getElementById("problem-form").onsubmit = async (e) => {
        e.preventDefault();
        try {
          const samples = parseJsonField(document.getElementById("samples_json").value, "样例");
          const test_cases = parseJsonField(document.getElementById("test_cases_json").value, "测试点");
          const body = {
            title: document.getElementById("title").value.trim(),
            description: document.getElementById("description").value,
            input_description: document.getElementById("input_description").value,
            output_description: document.getElementById("output_description").value,
            samples,
            constraints: document.getElementById("constraints").value,
            time_limit: Number(document.getElementById("time_limit").value),
            memory_limit: Number(document.getElementById("memory_limit").value),
            difficulty: document.getElementById("difficulty").value,
            tags: document.getElementById("tags").value
              .split(",")
              .map((t) => t.trim())
              .filter(Boolean),
            test_cases,
          };
          let res;
          if (editingId) {
            res = await api(`/api/problems/${encodeURIComponent(editingId)}`, {
              method: "PUT",
              body,
            });
          } else {
            body.id = document.getElementById("id").value.trim();
            res = await api("/api/problems", { method: "POST", body });
          }
          if (res.code !== 200 && res.code !== 201) {
            showAlert(alertEl, res.message || "保存失败");
            return;
          }
          showAlert(alertEl, editingId ? "更新成功" : "创建成功", "ok");
          fillForm(null);
          await loadList();
        } catch (err) {
          showAlert(alertEl, err.message || "表单错误");
        }
      };
    })();
  </script>
</body>
</html>
