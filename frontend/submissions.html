<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>提交列表 · Summer OJ</title>
  <link rel="stylesheet" href="/css/style.css?v=3" />
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">Python <span>Summer OJ</span></div>
      <nav class="nav">
        <a href="/problems.html">题目</a>
        <a href="/submissions.html">我的提交</a>
        <a href="/teacher.html" data-role-teacher style="display:none">题目管理</a>
        <a href="/admin.html" data-role-admin style="display:none">系统管理</a>
        <span class="userchip" id="current-user">...</span>
        <a href="#" onclick="logout(); return false;">登出</a>
      </nav>
    </header>

    <div id="alert" class="alert" hidden></div>
    <section class="panel">
      <h1 id="page-title">我的提交</h1>
      <p class="page-sub">学生仅看自己的记录；教师/管理员可看全部</p>
      <div id="list"></div>
      <div id="pager"></div>
    </section>
  </div>
  <script src="/js/api.js?v=3"></script>
  <script>
    const PAGE_SIZE = 20;
    let currentUser = null;
    const alertEl = document.getElementById("alert");
    const box = document.getElementById("list");
    const pager = document.getElementById("pager");

    async function loadPage(page) {
      const res = await api(`/api/submissions?page=${page}&page_size=${PAGE_SIZE}`);
      if (res.code !== 200) {
        showAlert(alertEl, res.message || "加载失败");
        return;
      }
      const data = res.data || {};
      const items = data.items || [];
      const total = data.total || 0;
      const cur = data.page || page;
      const showUser = currentUser && currentUser.role !== "student";

      if (!items.length && total === 0) {
        box.innerHTML = '<p class="empty">暂无提交</p>';
        pager.innerHTML = "";
        return;
      }
      box.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>时间</th><th>题目</th><th>状态</th><th>结果</th><th>得分</th>
              ${showUser ? "<th>用户</th>" : ""}
            </tr>
          </thead>
          <tbody>
            ${items.map((s) => `
              <tr>
                <td class="muted">${escapeHtml(s.created_at || "")}</td>
                <td><a href="/problem.html?id=${encodeURIComponent(s.problem_id)}">${escapeHtml(s.problem_id)}</a></td>
                <td>${statusBadge(s.status)}</td>
                <td>${resultBadge(s.result)}</td>
                <td>
                  <a href="/submission.html?id=${encodeURIComponent(s.id)}">${s.score ?? 0}</a>
                </td>
                ${showUser ? `<td class="muted">${escapeHtml(s.user_id || "")}</td>` : ""}
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
      pager.innerHTML = renderPaginationHtml(cur, PAGE_SIZE, total);
      wirePagination(pager, loadPage);
    }

    (async () => {
      currentUser = await requireLogin();
      if (!currentUser) return;
      fillNavUser(currentUser);
      if (currentUser.role !== "student") {
        document.getElementById("page-title").textContent = "全部提交";
      }
      await loadPage(1);
    })();
  </script>
</body>
</html>
