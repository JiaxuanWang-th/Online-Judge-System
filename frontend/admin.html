<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>系统管理 · Summer OJ</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">Python <span>Summer OJ</span></div>
      <nav class="nav">
        <a href="/problems.html">题目</a>
        <a href="/submissions.html">提交</a>
        <a href="/teacher.html" data-role-teacher style="display:none">题目管理</a>
        <a href="/admin.html" data-role-admin>系统管理</a>
        <span class="userchip" id="current-user">...</span>
        <a href="#" onclick="logout(); return false;">登出</a>
      </nav>
    </header>

    <div id="alert" class="alert" hidden></div>

    <section class="panel">
      <h1>用户管理</h1>
      <div id="users"></div>
    </section>

    <section class="panel">
      <h2>备份与恢复</h2>
      <div class="actions">
        <button class="btn btn-primary" id="backup-btn" type="button">创建备份</button>
        <button class="btn btn-secondary" id="refresh-backups" type="button">刷新列表</button>
      </div>
      <p class="muted">恢复成功后会清空当前登录 Session，需要重新登录。</p>
      <div id="backups"></div>
    </section>
  </div>
  <script src="/js/api.js"></script>
  <script>
    const alertEl = document.getElementById("alert");

    async function loadUsers() {
      const res = await api("/api/users");
      if (res.code !== 200) {
        document.getElementById("users").innerHTML =
          `<p class="empty">${escapeHtml(res.message || "无法加载用户")}</p>`;
        return;
      }
      const items = res.data || [];
      document.getElementById("users").innerHTML = `
        <table>
          <thead>
            <tr><th>用户名</th><th>角色</th><th>状态</th><th>操作</th></tr>
          </thead>
          <tbody>
            ${items.map((u) => `
              <tr>
                <td>${escapeHtml(u.username)}<div class="muted" style="font-size:0.8rem">${escapeHtml(u.id)}</div></td>
                <td>
                  <select data-role-user="${escapeHtml(u.id)}">
                    <option value="student" ${u.role === "student" ? "selected" : ""}>student</option>
                    <option value="teacher" ${u.role === "teacher" ? "selected" : ""}>teacher</option>
                    <option value="admin" ${u.role === "admin" ? "selected" : ""}>admin</option>
                  </select>
                </td>
                <td>${u.is_active ? '<span class="badge AC">active</span>' : '<span class="badge failed">disabled</span>'}</td>
                <td>
                  <button class="btn btn-secondary" data-save-user="${escapeHtml(u.id)}" type="button">保存角色</button>
                  <button class="btn btn-danger" data-toggle-user="${escapeHtml(u.id)}" data-active="${u.is_active}" type="button">
                    ${u.is_active ? "禁用" : "启用"}
                  </button>
                </td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;

      document.querySelectorAll("[data-save-user]").forEach((btn) => {
        btn.onclick = async () => {
          const id = btn.getAttribute("data-save-user");
          const role = document.querySelector(`[data-role-user="${CSS.escape(id)}"]`).value;
          const r = await api(`/api/users/${encodeURIComponent(id)}`, {
            method: "PUT",
            body: { role },
          });
          if (r.code !== 200) {
            showAlert(alertEl, r.message || "更新失败");
            return;
          }
          showAlert(alertEl, "角色已更新", "ok");
          await loadUsers();
        };
      });

      document.querySelectorAll("[data-toggle-user]").forEach((btn) => {
        btn.onclick = async () => {
          const id = btn.getAttribute("data-toggle-user");
          const active = btn.getAttribute("data-active") === "true";
          const r = await api(`/api/users/${encodeURIComponent(id)}`, {
            method: "PUT",
            body: { is_active: !active },
          });
          if (r.code !== 200) {
            showAlert(alertEl, r.message || "更新失败");
            return;
          }
          showAlert(alertEl, active ? "已禁用" : "已启用", "ok");
          await loadUsers();
        };
      });
    }

    async function loadBackups() {
      const res = await api("/api/admin/backups");
      if (res.code !== 200) {
        document.getElementById("backups").innerHTML =
          `<p class="empty">${escapeHtml(res.message || "无法加载备份")}</p>`;
        return;
      }
      const items = (res.data && res.data.items) || [];
      if (!items.length) {
        document.getElementById("backups").innerHTML = '<p class="empty">暂无备份</p>';
        return;
      }
      document.getElementById("backups").innerHTML = `
        <table>
          <thead><tr><th>备份 ID</th><th>时间</th><th>操作</th></tr></thead>
          <tbody>
            ${items.map((b) => `
              <tr>
                <td><code>${escapeHtml(b.backup_id)}</code></td>
                <td class="muted">${escapeHtml(b.created_at || "")}</td>
                <td>
                  <button class="btn btn-danger" data-restore="${escapeHtml(b.backup_id)}" type="button">恢复</button>
                </td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
      document.querySelectorAll("[data-restore]").forEach((btn) => {
        btn.onclick = async () => {
          const id = btn.getAttribute("data-restore");
          if (!confirm(`确认恢复备份 ${id}？当前数据会被覆盖。`)) return;
          const r = await api(`/api/admin/backups/${encodeURIComponent(id)}/restore`, {
            method: "POST",
            body: {},
          });
          if (r.code !== 200) {
            showAlert(alertEl, r.message || "恢复失败");
            return;
          }
          showAlert(alertEl, "恢复成功，请重新登录", "ok");
          setTimeout(() => { window.location.href = "/"; }, 800);
        };
      });
    }

    (async () => {
      const user = await requireLogin();
      if (!user) return;
      fillNavUser(user);
      if (user.role !== "admin") {
        showAlert(alertEl, "权限不足：仅管理员可访问");
        return;
      }
      await loadUsers();
      await loadBackups();

      document.getElementById("backup-btn").onclick = async () => {
        const r = await api("/api/admin/backups", { method: "POST", body: {} });
        if (r.code !== 201) {
          showAlert(alertEl, r.message || "备份失败");
          return;
        }
        showAlert(alertEl, `备份已创建：${r.data.backup_id}`, "ok");
        await loadBackups();
      };
      document.getElementById("refresh-backups").onclick = () => loadBackups();
    })();
  </script>
</body>
</html>
